# Optional Kubernetes manifest for the dashboard.
# Intended for a LOCAL Minikube demo, NOT for the HPC cluster.
#
# Quick start (Minikube):
#   minikube start
#   eval $(minikube docker-env)
#   docker build -t hpc-traffic-lights-dashboard:latest dashboard/
#   kubectl apply -f dashboard/k8s-deployment.yaml
#   minikube service hpc-traffic-lights-dashboard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpc-traffic-lights-dashboard
  labels:
    app: hpc-traffic-lights-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hpc-traffic-lights-dashboard
  template:
    metadata:
      labels:
        app: hpc-traffic-lights-dashboard
    spec:
      containers:
        - name: dashboard
          image: hpc-traffic-lights-dashboard:latest
          # Use locally built image (don't pull from a registry) for Minikube:
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hpc-traffic-lights-dashboard
spec:
  type: NodePort
  selector:
    app: hpc-traffic-lights-dashboard
  ports:
    - port: 80
      targetPort: 80
